spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: money-snapshot
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5456/money_snapshot}
    username: ${DB_USERNAME:money_snapshot}
    password: ${DB_PASSWORD:money_snapshot}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

server:
  port: ${SERVER_PORT:5081}

app:
  admin:
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
    first-name: ${ADMIN_FIRST_NAME:Admin}
    last-name: ${ADMIN_LAST_NAME:User}
  security:
    remember-me-days: ${REMEMBER_ME_DAYS:30}
