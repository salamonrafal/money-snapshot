<!doctype html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Logowanie | Money Snapshot</title>
    <script>
        try {
            const theme = localStorage.getItem("money-snapshot-theme");
            if (theme === "dark") {
                document.documentElement.dataset.theme = "dark";
            }
        } catch {
        }
    </script>
    <link rel="stylesheet" th:href="@{/css/styles.css(v='20260528-theme-switcher')}">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/money_snapshot_mark.svg}">
    <script defer th:src="@{/js/i18n.js(v='20260516-login-i18n')}"></script>
    <script defer th:src="@{/js/login.js(v='20260516-login-i18n')}"></script>
</head>
<body class="login-page">
<main class="login-shell">
    <section class="login-panel" aria-labelledby="login-title">
        <div class="login-panel-header">
            <a class="brand" href="/login" aria-label="Money Snapshot">
                <img class="brand-icon" th:src="@{/images/money_snapshot_mark.svg}" alt="" width="40" height="40">
                <span data-i18n="app.name">Money Snapshot</span>
            </a>
            <label class="language-switcher">
                <span data-i18n="common.nav.language">Język</span>
                <select id="language-select" aria-label="Language">
                    <option value="pl">PL</option>
                    <option value="en">EN</option>
                </select>
            </label>
        </div>

        <p class="eyebrow" data-i18n="login.heading.eyebrow">Dostęp do panelu</p>
        <h1 id="login-title" data-i18n="login.heading.title">Zaloguj się</h1>
        <p class="login-copy" data-i18n="login.heading.subtitle">Podaj e-mail i hasło, aby przejść do aplikacji.</p>

        <p class="form-message" id="login-message" role="status"></p>

        <form class="login-form" action="/login" method="post">
            <label class="field">
                <span data-i18n="login.form.email">E-mail</span>
                <input name="username" type="email" autocomplete="email" required autofocus>
            </label>
            <label class="field">
                <span data-i18n="login.form.password">Hasło</span>
                <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <label class="checkbox-field" th:if="${rememberMeEnabled}">
                <input name="remember-me" type="checkbox">
                <span data-i18n="login.form.rememberMe">Zapamiętaj mnie</span>
            </label>
            <p class="form-message" data-type="error" th:unless="${rememberMeEnabled}" data-i18n="login.form.rememberMeUnavailable">Opcja Zapamiętaj mnie jest wyłączona, ponieważ nie ustawiono klucza REMEMBER_ME_KEY.</p>
            <div class="form-actions">
                <button type="submit" class="button primary" data-i18n="login.form.submit">Zaloguj</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
