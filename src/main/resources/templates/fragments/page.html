<!doctype html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title, pageScript)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Money Snapshot</title>
    <script>
        try {
            const theme = localStorage.getItem("money-snapshot-theme");
            if (theme === "dark") {
                document.documentElement.dataset.theme = "dark";
            }
        } catch {
        }
    </script>
    <link rel="stylesheet" th:href="@{/css/styles.css(v='20260605-snapshot-modal')}">
    <link rel="icon" type="image/svg+xml" th:href="@{/images/money_snapshot_mark.svg}">
    <script defer th:src="@{/js/i18n.js(v='20260524-banks-accounts-ui')}"></script>
    <script defer th:src="@{/js/shared-ui.js(v='20260605-snapshot-modal')}"></script>
    <script defer th:src="@{/js/{script}(script=${pageScript},v='20260605-snapshot-modal')}"></script>
</head>
<body>
<header class="topbar" th:fragment="header(activePage)">
    <a class="brand" href="/" aria-label="Money Snapshot">
        <img class="brand-icon" th:src="@{/images/money_snapshot_mark.svg}" alt="" width="40" height="40">
        <span data-i18n="app.name">Money Snapshot</span>
    </a>
    <button type="button"
            class="menu-toggle"
            aria-expanded="false"
            aria-controls="main-menu"
            data-i18n-aria-label="common.nav.menu.open"
            aria-label="Otwórz menu">
        <span class="menu-toggle-bar"></span>
        <span class="menu-toggle-bar"></span>
        <span class="menu-toggle-bar"></span>
        <span class="visually-hidden menu-toggle-open-label" data-i18n="common.nav.menu.open">Otwórz menu</span>
        <span class="visually-hidden menu-toggle-close-label" data-i18n="common.nav.menu.close">Zamknij menu</span>
    </button>
    <div class="topbar-actions">
        <nav class="main-nav" id="main-menu" aria-label="Main navigation">
            <a href="/"
               th:attr="aria-current=${activePage == 'home' ? 'page' : null}"
               data-i18n="common.nav.home">Start</a>
            <a href="/banks-accounts.html"
               th:attr="aria-current=${activePage == 'banks-accounts' || activePage == 'banks' || activePage == 'accounts' ? 'page' : null}"
               data-i18n="common.nav.banksAccounts">Banki i Konta</a>
            <a href="/users.html"
               sec:authorize="hasRole('ADMINISTRATOR')"
               th:attr="aria-current=${activePage == 'users' ? 'page' : null}"
               data-i18n="common.nav.users">Użytkownicy</a>
            <a href="/profile.html"
               th:attr="aria-current=${activePage == 'profile' ? 'page' : null}"
               data-i18n="common.nav.profile">Profil</a>
            <a href="/settings.html"
               th:attr="aria-current=${activePage == 'settings' ? 'page' : null}"
               data-i18n="common.nav.settings">Ustawienia</a>
        </nav>
        <label class="language-switcher">
            <span data-i18n="common.nav.language">Język</span>
            <select id="language-select" aria-label="Language">
                <option value="pl">PL</option>
                <option value="en">EN</option>
            </select>
        </label>
        <form class="logout-form" action="/logout" method="post">
            <button type="submit" class="button secondary compact" data-i18n="common.nav.logout">Wyloguj</button>
        </form>
    </div>
</header>

<div class="modal-backdrop"
     th:fragment="confirmDeleteModal(modalId, titleId, titleKey, messageKey, subjectId, confirmId, cancelId)"
     th:id="${modalId}"
     hidden>
    <div class="modal" role="dialog" aria-modal="true" th:attr="aria-labelledby=${titleId}">
        <h2 th:id="${titleId}" th:attr="data-i18n=${titleKey}">Usuń</h2>
        <p th:attr="data-i18n=${messageKey}">Czy na pewno chcesz wykonać nieodwracalną akcję usunięcia?</p>
        <p class="modal-subject" th:id="${subjectId}"></p>
        <div class="modal-actions">
            <button type="button" class="button danger" th:id="${confirmId}" data-i18n="common.delete.confirm">Tak</button>
            <button type="button" class="button secondary" th:id="${cancelId}" data-i18n="common.delete.cancel">Anuluj</button>
        </div>
    </div>
</div>
</body>
</html>
