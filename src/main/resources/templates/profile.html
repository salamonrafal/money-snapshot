<!doctype html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/page :: head('Profil | Money Snapshot', 'profile.js')}"></head>
<body>
<header th:replace="~{fragments/page :: header('profile')}"></header>

<main class="workspace">
    <section class="page-heading">
        <p class="eyebrow" data-i18n="profile.heading.eyebrow">Konto</p>
        <h1 data-i18n="profile.heading.title">Mój profil</h1>
        <p data-i18n="profile.heading.subtitle">Edytuj swoje dane widoczne w aplikacji i zmień hasło.</p>
    </section>

    <section class="management-layout single-column" aria-label="Profil użytkownika">
        <form class="editor-panel wide-panel" id="profile-form">
            <label class="field">
                <span data-i18n="profile.form.email">E-mail</span>
                <input id="profile-email" type="email" disabled>
            </label>
            <label class="field">
                <span data-i18n="profile.form.firstName">Imię</span>
                <input id="profile-first-name" type="text" maxlength="120" autocomplete="given-name" required>
            </label>
            <label class="field">
                <span data-i18n="profile.form.lastName">Nazwisko</span>
                <input id="profile-last-name" type="text" maxlength="120" autocomplete="family-name" required>
            </label>
            <label class="field">
                <span data-i18n="profile.form.description">Krótki opis</span>
                <textarea id="profile-description" maxlength="500" rows="4"></textarea>
            </label>
            <label class="field">
                <span data-i18n="profile.form.password">Nowe hasło</span>
                <input id="profile-password" type="password" minlength="8" maxlength="120" autocomplete="new-password">
            </label>
            <div class="form-actions">
                <button type="submit" class="button primary" data-i18n="profile.form.submit">Zapisz zmiany</button>
            </div>
            <p class="form-message" id="profile-form-message" role="status"></p>
        </form>
    </section>
</main>
</body>
</html>
