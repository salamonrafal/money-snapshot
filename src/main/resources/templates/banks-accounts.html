<!doctype html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/page :: head('Banki i Konta | Money Snapshot', 'banks-accounts.js')}"></head>
<body>
<header th:replace="~{fragments/page :: header('banks-accounts')}"></header>

<main class="workspace">
    <section class="page-heading">
        <p class="eyebrow" data-i18n="banksAccounts.heading.eyebrow">Wspólny rejestr</p>
        <h1 data-i18n="banksAccounts.heading.title">Banki i Konta</h1>
        <p data-i18n="banksAccounts.heading.subtitle">Przeglądaj banki i rozwijaj listę kont przypisanych do każdego z nich.</p>
    </section>

    <section class="banks-accounts-panels"
             data-i18n-aria-label="banksAccounts.aria.management"
             aria-label="Zarządzanie bankami i kontami">
        <section class="table-panel" aria-labelledby="bank-account-list-title">
            <div class="section-header">
                <h2 id="bank-account-list-title" data-i18n="banksAccounts.heading.title">Banki i Konta</h2>
                <div class="section-actions savings-planning-tool-menu">
                    <a href="/banks/new.html?returnTo=%2Fbanks-accounts.html"
                       class="icon-button secondary"
                       id="new-bank-action"
                       title="Nowy bank"
                       data-i18n-title="banks.actions.add"
                       data-i18n-aria-label="banks.actions.add"
                       aria-label="Nowy bank">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M3 10 12 4l9 6"></path>
                            <path d="M5 10v8"></path>
                            <path d="M9 10v8"></path>
                            <path d="M15 10v8"></path>
                            <path d="M19 10v8"></path>
                            <path d="M3 20h18"></path>
                        </svg>
                    </a>
                    <a href="/accounts/new.html?returnTo=%2Fbanks-accounts.html"
                       class="icon-button secondary"
                       id="new-account-action"
                       title="Dodaj konto"
                       data-i18n-title="accounts.actions.add"
                       data-i18n-aria-label="accounts.actions.add"
                       aria-label="Dodaj konto">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M12 5v14"></path>
                            <path d="M5 12h14"></path>
                        </svg>
                    </a>
                    <button type="button"
                            class="icon-button secondary"
                            id="refresh-bank-account-list"
                            title="Odśwież"
                            data-i18n-title="banks.actions.refresh"
                            data-i18n-aria-label="banks.actions.refresh"
                            aria-label="Odśwież">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
                            <path d="M21 3v6h-6"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <p class="form-message" id="bank-account-list-message" role="status"></p>
            <div class="table-wrap banks-accounts-table-wrap">
                <table class="banks-accounts-table">
                    <thead>
                    <tr>
                        <th data-i18n="banks.table.name">Nazwa</th>
                        <th data-i18n="banks.table.normalizedName">Normalizacja</th>
                        <th data-i18n="banksAccounts.table.accounts">Konta</th>
                        <th data-i18n="banks.table.actions">Akcje</th>
                    </tr>
                    </thead>
                    <tbody id="bank-account-table-body">
                    <tr>
                        <td colspan="4" data-i18n="banks.loading">Ładowanie...</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </section>
</main>

<div th:replace="~{fragments/page :: confirmDeleteModal(
        'delete-bank-modal',
        'delete-bank-title',
        'banks.delete.title',
        'banks.delete.message',
        'delete-bank-name',
        'confirm-delete-bank',
        'cancel-delete-bank')}"></div>
<div th:replace="~{fragments/page :: confirmDeleteModal(
        'delete-account-modal',
        'delete-account-title',
        'accounts.delete.title',
        'accounts.delete.message',
        'delete-account-name',
        'confirm-delete-account',
        'cancel-delete-account')}"></div>
<div class="modal-backdrop" id="entity-info-modal" hidden>
    <div class="modal info-modal" role="dialog" aria-modal="true" aria-labelledby="entity-info-title">
        <h2 id="entity-info-title" th:text="#{banksAccounts.info.title}">Szczegóły</h2>
        <dl class="info-list" id="entity-info-list"></dl>
        <div class="modal-actions">
            <button type="button" class="button secondary" id="entity-info-close" data-i18n="banksAccounts.info.close">Zamknij</button>
        </div>
    </div>
</div>
</body>
</html>
